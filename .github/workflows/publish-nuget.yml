name: Publish to NuGet

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required so GitHub can issue the OIDC token for NuGet Trusted Publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore AlgorandAuthentication.sln

      - name: Build
        run: dotnet build AlgorandAuthentication.sln -c Release --no-restore

      - name: Test
        run: dotnet test AlgorandAuthentication.sln -c Release --no-build

      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJ_VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' AlgorandAuthentication/AlgorandAuthentication.csproj)
          echo "Tag version: $TAG_VERSION"
          echo "Project version: $PROJ_VERSION"
          if [ "$TAG_VERSION" != "$PROJ_VERSION" ]; then
            echo "::error::Git tag ($TAG_VERSION) does not match <Version> in AlgorandAuthentication.csproj ($PROJ_VERSION)."
            exit 1
          fi

      - name: Pack
        run: dotnet pack AlgorandAuthentication/AlgorandAuthentication.csproj -c Release --no-build -o artifacts

      # Exchanges this workflow's GitHub OIDC token for a short-lived (1 hour, single-use) NuGet API key.
      # Requires a Trusted Publishing policy configured on nuget.org for this repo + workflow file.
      # See: https://learn.microsoft.com/en-us/nuget/nuget-org/trusted-publishing
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: NuGet push
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
