name: Release

# Builds, tests, packs and publishes to nuget.org in a single run — no PAT needed.
# (A commit/tag pushed with the default GITHUB_TOKEN doesn't re-trigger other
# workflows, so publish-nuget.yml would never fire for a push made from here.
# Doing everything in one job sidesteps that instead of adding a personal
# access token, keeping this strictly on nuget.org Trusted Publishing / OIDC.)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version to release (e.g. 2.1.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # required so GitHub can issue the OIDC token for NuGet Trusted Publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$VERSION' is not in the form X.Y.Z (e.g. 2.1.3)."
            exit 1
          fi

      - name: Check tag does not already exist
        shell: bash
        run: |
          TAG="v${{ inputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "::error::Tag $TAG already exists."
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Update csproj version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          FILE="AlgorandAuthentication/AlgorandAuthentication.csproj"
          sed -i "s#<Version>[^<]*</Version>#<Version>${VERSION}</Version>#" "$FILE"
          sed -i "s#<AssemblyVersion>[^<]*</AssemblyVersion>#<AssemblyVersion>${VERSION}.0</AssemblyVersion>#" "$FILE"
          grep -E "<Version>|<AssemblyVersion>" "$FILE"

      - name: Restore
        run: dotnet restore AlgorandAuthentication.sln

      - name: Build
        run: dotnet build AlgorandAuthentication.sln -c Release --no-restore

      - name: Test
        run: dotnet test AlgorandAuthentication.sln -c Release --no-build

      - name: Pack
        run: dotnet pack AlgorandAuthentication/AlgorandAuthentication.csproj -c Release --no-build -o artifacts

      # Exchanges this workflow's GitHub OIDC token for a short-lived (1 hour, single-use) NuGet API key.
      # Requires a Trusted Publishing policy configured on nuget.org for this repo + workflow file.
      # See: https://learn.microsoft.com/en-us/nuget/nuget-org/trusted-publishing
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: NuGet push
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # Only commit/tag once the package has actually published successfully.
      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AlgorandAuthentication/AlgorandAuthentication.csproj
          git commit -m "v ${{ inputs.version }} - release"

      - name: Tag
        shell: bash
        run: git tag "v${{ inputs.version }}"

      - name: Push commit and tag
        shell: bash
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ inputs.version }}"
