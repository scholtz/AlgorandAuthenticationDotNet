name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version to release (e.g. 2.1.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump-tag-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$VERSION' is not in the form X.Y.Z (e.g. 2.1.3)."
            exit 1
          fi

      - name: Check tag does not already exist
        shell: bash
        run: |
          TAG="v${{ inputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "::error::Tag $TAG already exists."
            exit 1
          fi

      - name: Update csproj version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          FILE="AlgorandAuthentication/AlgorandAuthentication.csproj"
          sed -i "s#<Version>[^<]*</Version>#<Version>${VERSION}</Version>#" "$FILE"
          sed -i "s#<AssemblyVersion>[^<]*</AssemblyVersion>#<AssemblyVersion>${VERSION}.0</AssemblyVersion>#" "$FILE"
          grep -E "<Version>|<AssemblyVersion>" "$FILE"

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AlgorandAuthentication/AlgorandAuthentication.csproj
          git commit -m "v ${{ inputs.version }} - release"

      - name: Tag
        shell: bash
        run: git tag "v${{ inputs.version }}"

      - name: Push commit and tag
        shell: bash
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ inputs.version }}"
